<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>众眇之门</title>
    <link rel="stylesheet" href="//at.alicdn.com/t/c/font_4809197_u4dqklzzzys.css">
    <link rel="stylesheet" href="/css/jieqi.css">
    <link rel="stylesheet" href="/css/custom.css">
    <script>
        // 添加页面标识类，帮助CSS选择器识别
        document.documentElement.classList.add('custom-index-page');
        window.onload = function() {
            document.body.classList.add('page-index');
        };
    </script>
</head>
<body>
    <!-- 导航栏 -->
    <header class="site-header">
        <a href="/" class="site-title">众眇之门</a>
        <nav class="main-menu">
            <a href="blog/" class="menu-item">博客</a>
            <a href="book/" class="menu-item">藏宝阁</a>
            <a href="introduction/" class="menu-item">导师简介</a>
        </nav>
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>
    
    <!-- 流星容器 -->
    <div class="meteor-container" id="meteorContainer"></div>
    
    <!-- 主要内容区域 -->
    <div class="container">
        <div class="compass">
            <!-- 罗盘内容将由JavaScript动态生成 -->
        </div>
        
        <!-- 添加底部闪烁箭头 -->
        <div class="scroll-indicator">
            <div class="arrow-down">
                <i class="iconfont icon-arrow-down"></i>
            </div>
        </div>
    </div>
    
    <script src="/js/jieqi.js"></script>
    <script>
        // 自动旋转功能
        document.addEventListener('DOMContentLoaded', function() {
            // 获取旋转开关元素
            const autoRotateToggle = document.getElementById('autoRotateToggle');
            
            // 添加事件监听，使用script.js中的实现
            if (autoRotateToggle) {
                autoRotateToggle.addEventListener('change', function() {
                    if (this.checked) {
                        window.startAutoRotation(); // 使用script.js中的函数
                    } else {
                        window.stopAutoRotation(); // 使用script.js中的函数
                    }
                });
                
                autoRotateToggle.checked = false;
            }
            
            // 移动端菜单切换
            const menuToggle = document.querySelector('.menu-toggle');
            const mainMenu = document.querySelector('.main-menu');
            
            if (menuToggle && mainMenu) {
                menuToggle.addEventListener('click', function() {
                    this.classList.toggle('active');
                    mainMenu.classList.toggle('active');
                });
                
                // 点击菜单项时关闭菜单
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.addEventListener('click', function() {
                        menuToggle.classList.remove('active');
                        mainMenu.classList.remove('active');
                    });
                });
            }
            
            // 添加向上滑动和点击箭头跳转到博客页面的功能
            const isMobile = window.innerWidth <= 768;
            const container = document.querySelector('.container');
            const scrollIndicator = document.querySelector('.scroll-indicator');
            
            // 点击底部箭头跳转到博客页面
            if (scrollIndicator) {
                scrollIndicator.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation(); // 阻止事件冒泡，避免触发罗盘旋转
                    window.location.href = '/blog/';
                });
            }
            
            // 在移动端添加上滑手势
            if (isMobile && container) {
                let touchStartY = 0;
                let touchEndY = 0;
                
                container.addEventListener('touchstart', function(e) {
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });
                
                container.addEventListener('touchend', function(e) {
                    touchEndY = e.changedTouches[0].clientY;
                    
                    // 计算滑动距离和方向
                    const swipeDistance = touchStartY - touchEndY;
                    
                    // 如果是向上滑动且滑动距离足够大，则跳转到博客页面
                    if (swipeDistance > 100) { // 滑动距离大于100px视为有效滑动
                        window.location.href = '/blog/';
                    }
                }, { passive: true });
            }
        });
        
        // 流星效果
        function checkIsMobile() {
            return window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        let isMobileDevice = checkIsMobile();
        let wasMobile = isMobileDevice;
        let meteorIntervalId; // 用于存储流星生成的定时器ID
        
        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            isMobileDevice = checkIsMobile();
            
            // 如果设备类型发生变化，重置流星生成频率
            if (wasMobile !== isMobileDevice && meteorIntervalId) {
                clearInterval(meteorIntervalId);
                if (!isMobileDevice) {
                    // 只在非移动设备上设置流星生成
                    const meteorInterval = 4000;
                    meteorIntervalId = setInterval(createSimpleMeteor, meteorInterval);
                }
            }
            wasMobile = isMobileDevice;
        });
        
        function createSimpleMeteor() {
            // 移动设备上不创建流星
            if (isMobileDevice) return;
            
            const container = document.getElementById('meteorContainer');
            
            // 随机生成流星起始位置
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight * 0.5; // 在上半部分生成
            
            // 流星大小 - 桌面版使用正常大小
            const size = Math.random() * 3 + 1; // 桌面版流星大小
            
            // 流星速度
            const speed = Math.random() * 100 + 50;
            
            // 流星长度
            const length = Math.random() * 80 + 40;
            
            // 流星运动角度（135度，右下方向）
            const angle = Math.PI * 0.75;
            
            // 创建流星头部
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.width = `${size}px`;
            meteor.style.height = `${size}px`;
            meteor.style.left = `${startX}px`;
            meteor.style.top = `${startY}px`;
            
            // 创建流星尾巴元素
            const tail = document.createElement('div');
            tail.className = 'meteor-tail';
            tail.style.left = `${startX}px`;
            tail.style.top = `${startY}px`;
            tail.style.width = `${length}px`;
            tail.style.height = `${size / 2}px`;
            tail.style.transformOrigin = '0% 50%';
            tail.style.transform = `rotate(${angle - Math.PI}rad)`;
            
            // 先添加尾巴，再添加流星头部 (保持尾巴在头部下面的层级)
            container.appendChild(tail);
            container.appendChild(meteor);
            
            // 让流星移动的动画帧
            const startTime = performance.now();
            const duration = Math.random() * 1000 + 1000; // 流星持续时间1-2秒
            
            function animateMeteor(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 计算当前位置
                const distance = speed * progress;
                const posX = startX + Math.cos(angle) * distance;
                const posY = startY + Math.sin(angle) * distance;
                
                // 更新流星头部位置
                meteor.style.left = `${posX}px`;
                meteor.style.top = `${posY}px`;
                
                // 更新尾巴位置 - 尾巴起点跟随流星头部但指向反方向
                const tailX = posX;
                const tailY = posY;
                tail.style.left = `${tailX}px`;
                tail.style.top = `${tailY}px`;
                
                // 动画结束时移除流星
                if (progress >= 1 || posX < 0 || posX > window.innerWidth || posY < 0 || posY > window.innerHeight) {
                    tail.remove();
                    meteor.remove();
                } else {
                    requestAnimationFrame(animateMeteor);
                }
            }
            
            requestAnimationFrame(animateMeteor);
        }
        
        // 只在非移动设备上初始化流星
        if (!isMobileDevice) {
            // 定期创建流星
            const meteorInterval = 4000;
            meteorIntervalId = setInterval(createSimpleMeteor, meteorInterval);
            
            // 初始创建几个流星
            const initialMeteors = 3;
            for (let i = 0; i < initialMeteors; i++) {
                setTimeout(createSimpleMeteor, Math.random() * 5000);
            }
            
            // 点击创建流星
            document.addEventListener('click', (e) => {
                // 移动设备上不创建流星
                if (isMobileDevice) return;
                
                // 获取点击位置
                const clickX = e.clientX;
                const clickY = e.clientY;
                
                const container = document.getElementById('meteorContainer');
                
                // 流星大小
                const size = Math.random() * 3 + 1;
                
                // 流星速度
                const speed = Math.random() * 150 + 100;
                
                // 流星长度
                const length = Math.random() * 100 + 50;
                
                // 流星运动角度
                const angle = Math.PI * 0.75;
                
                // 创建流星头部
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                meteor.style.width = `${size}px`;
                meteor.style.height = `${size}px`;
                meteor.style.left = `${clickX}px`;
                meteor.style.top = `${clickY}px`;
                
                // 创建流星尾巴
                const tail = document.createElement('div');
                tail.className = 'meteor-tail';
                tail.style.left = `${clickX}px`;
                tail.style.top = `${clickY}px`;
                tail.style.width = `${length}px`;
                tail.style.height = `${size / 2}px`;
                tail.style.transformOrigin = '0% 50%';
                tail.style.transform = `rotate(${angle - Math.PI}rad)`;
                
                // 添加到容器
                container.appendChild(tail);
                container.appendChild(meteor);
                
                // 流星动画
                const startTime = performance.now();
                const duration = Math.random() * 800 + 800; // 流星持续时间0.8-1.6秒
                
                function animateMeteor(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // 计算当前位置
                    const distance = speed * progress;
                    const posX = clickX + Math.cos(angle) * distance;
                    const posY = clickY + Math.sin(angle) * distance;
                    
                    // 更新流星头部位置
                    meteor.style.left = `${posX}px`;
                    meteor.style.top = `${posY}px`;
                    
                    // 更新尾巴位置 - 尾巴起点跟随流星头部但指向反方向
                    const tailX = posX;
                    const tailY = posY;
                    tail.style.left = `${tailX}px`;
                    tail.style.top = `${tailY}px`;
                    
                    // 动画结束时移除流星
                    if (progress >= 1 || posX < 0 || posX > window.innerWidth || posY < 0 || posY > window.innerHeight) {
                        tail.remove();
                        meteor.remove();
                    } else {
                        requestAnimationFrame(animateMeteor);
                    }
                }
                
                requestAnimationFrame(animateMeteor);
            });
        }
    </script>
